<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>খায়ের ভাইয়ের হিসাব</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 10px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 95vw; max-width: 600px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        input { width: 100px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: right; }
        .btn-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
        .save-btn { background: #1a73e8; }
        .pdf-btn { background: #d93025; }
        .print-btn { background: #34a853; }
        #res_box { padding: 15px; text-align: center; font-size: 18px; font-weight: bold; border: 2px solid #ddd; margin: 15px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>খায়ের ভাইয়ের হিসাব</h1>
    <div class="row"><label>Suhaina (1349)</label><input type="number" id="s1"></div>
    <div class="row"><label>Suhaina (456)</label><input type="number" id="s2"></div>
    <div class="row"><label>Unique</label><input type="number" id="u"></div>
    <div class="row"><label>Cash</label><input type="number" id="c"></div>
    <div class="row"><label>Online</label><input type="number" id="o"></div>
    <div class="row"><label>Charge</label><input type="number" id="ch"></div>
    <div class="row"><label>Ager</label><input type="number" id="a"></div>
    
    <div id="res_box">হিসাব দেখুন...</div>

    <div class="btn-container">
        <button class="save-btn" onclick="saveData()">Save Data</button>
        <button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>
        <button class="print-btn" onclick="window.print()">Print</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "https://suhaina-111de-default-rtdb.firebaseio.com/",
        projectId: "suhaina-111de"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ডাটা লোড
    db.ref('hisab').once('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            for (let key in data) {
                if (document.getElementById(key)) document.getElementById(key).value = data[key];
            }
            runCalculation();
        }
    });

    // আলাদা Save বাটন ফাংশন
    function saveData() {
        let inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            db.ref('hisab/' + input.id).set(input.value);
        });
        alert("ডাটা সফলভাবে সেভ হয়েছে!");
        runCalculation();
    }

    function runCalculation() {
        let s1 = Number(document.getElementById('s1').value) || 0;
        let s2 = Number(document.getElementById('s2').value) || 0;
        let u = Number(document.getElementById('u').value) || 0;
        let c = Number(document.getElementById('c').value) || 0;
        let o = Number(document.getElementById('o').value) || 0;
        let ch = Number(document.getElementById('ch').value) || 0;
        let a = Number(document.getElementById('a').value) || 0;

        let j = s1 + s2 + u + c;
        let onlineTotal = o + ch + a;
        let res = j - onlineTotal;
        let b = document.getElementById('res_box');
        
        if(j > onlineTotal) b.innerText = "খায়ের ভাই পাবে: " + res + " টাকা";
        else if(onlineTotal > j) b.innerText = "আমি পাবো: " + Math.abs(res) + " টাকা";
        else b.innerText = "হিসাব সমান সমান";
    }

    // PDF ডাউনলোডের জন্য একটি লাইব্রেরি ব্যবহার করা ভালো, আপাতত সাধারণ ফাংশন
    function downloadPDF() {
        alert("পিডিএফ জেনারেট হচ্ছে...");
        window.print(); // যেহেতু ব্রাউজারে পিডিএফ সেভ করার জন্য প্রিন্ট অপশনটিই সেরা।
    }
</script>
</body>
</html>
