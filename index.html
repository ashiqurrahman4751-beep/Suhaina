<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>খায়ের ভাইয়ের হিসাব</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: sans-serif; background: #eef2f3; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 95vw; max-width: 900px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1a73e8; margin-bottom: 15px; padding-bottom: 5px; }
        h1 { color: #1a73e8; font-size: 20px; margin: 0; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        input { width: 100px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: right; }
        .total-box { background: #e8f0fe; padding: 10px; margin-top: 10px; border-radius: 5px; text-align: center; font-weight: bold; color: #1967d2; }
        #res_box { padding: 15px; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; border: 2px solid #ddd; background: #fff; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>খায়ের ভাইয়ের হিসাব</h1><div id="d"></div></div>
    <div class="main-grid">
        <div class="section">
            <span style="font-weight:bold">জমা হিসাব</span>
            <div class="row"><label>Suhaina (1349)</label><input type="number" id="s1" oninput="save(this)"></div>
            <div class="row"><label>Suhaina (456)</label><input type="number" id="s2" oninput="save(this)"></div>
            <div class="row"><label>Unique</label><input type="number" id="u" oninput="save(this)"></div>
            <div class="row"><label>Cash</label><input type="number" id="c" oninput="save(this)"></div>
            <div class="total-box">Total জমা: <span id="tj">0</span></div>
        </div>
        <div class="section">
            <span style="font-weight:bold">অনলাইন হিসাব</span>
            <div class="row"><label>Online</label><input type="number" id="o" oninput="save(this)"></div>
            <div class="row"><label>Charge</label><input type="number" id="ch" oninput="save(this)"></div>
            <div class="row"><label>Ager</label><input type="number" id="a" oninput="save(this)"></div>
            <div style="margin-top:38px" class="total-box">Total Online: <span id="to">0</span></div>
        </div>
    </div>
    <div style="margin-top:20px">
        <div id="res_box">হিসাব দেখুন...</div>
        <button onclick="window.print()" style="background:#34a853; color:white; border:none; padding:10px; width:100%; border-radius:5px; cursor:pointer;">Save PDF / Print</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY", // আপনার Firebase Settings থেকে এই তথ্যগুলো দিন
        authDomain: "suhaina-111de.firebaseapp.com",
        databaseURL: "https://suhaina-111de-default-rtdb.firebaseio.com/",
        projectId: "suhaina-111de",
        storageBucket: "suhaina-111de.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    document.getElementById('d').innerText = "তারিখ: " + new Date().toLocaleDateString('bn-BD');

    // ডাটাবেস থেকে ডাটা লোড
    db.ref('hisab').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            for (let key in data) {
                if (document.getElementById(key)) document.getElementById(key).value = data[key];
            }
            run();
        }
    });

    // ডাটাবেসে ডাটা সেভ
    function save(el) {
        db.ref('hisab/' + el.id).set(el.value);
        run();
    }

    function run() {
        let s1 = Number(document.getElementById('s1').value) || 0;
        let s2 = Number(document.getElementById('s2').value) || 0;
        let u = Number(document.getElementById('u').value) || 0;
        let c = Number(document.getElementById('c').value) || 0;
        let o = Number(document.getElementById('o').value) || 0;
        let ch = Number(document.getElementById('ch').value) || 0;
        let a = Number(document.getElementById('a').value) || 0;

        let j = s1 + s2 + u + c;
        let onlineTotal = o + ch + a;
        document.getElementById('tj').innerText = j;
        document.getElementById('online_total') ? document.getElementById('online_total').innerText = onlineTotal : null;
        document.getElementById('to').innerText = onlineTotal;

        let res = j - onlineTotal;
        let b = document.getElementById('res_box');
        if(j > onlineTotal) { b.style.color="#137333"; b.innerText="খায়ের ভাই পাবে: "+res+" টাকা"; }
        else if(onlineTotal > j) { b.style.color="#a50e0e"; b.innerText="আমি পাবো: "+Math.abs(res)+" টাকা"; }
        else { b.innerText="হিসাব সমান সমান"; }
    }
</script>
</body>
</html>
